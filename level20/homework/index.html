<!-- 2) Html-ის დოკუმენტში კომენტარის სახით ჩამოწერეთ ყველა თეგი, რომელიც აქამდე ვისწავლეთ. თითოეულს მიუწერეთ დანიშნულება და დააკონკრეტეთ Container tag-ია თუ Empty თეგი. -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
    <p></p>  <!--პარაგრაფის კონტეინერ თეგი-->
    <h1></h1> <!--heading container tag-->
    <img src="" alt="" width=""> <!--image empty tag-->
    <button></button> <!--btn container tag-->
 </body>
 </html>
